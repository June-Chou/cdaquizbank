<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDA 练习题模拟题库</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root { --accent: #00897B; --header-bg: #1B3A4B; --bg-gray: #f4f4f4; --white: #ffffff; --success: #2ed573; --error: #ff4757; }
        body { font-family: "Segoe UI", Arial, sans-serif; background: var(--bg-gray); margin: 0; padding: 0; }
        .container { max-width: 850px; margin: 0 auto; padding: 20px; }
        header { background: var(--header-bg); color: white; padding: 1rem; text-align: center; border-bottom: 5px solid var(--accent); }
        
        .toolbar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px 20px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .jump-box { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .jump-input { width: 65px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 1rem; }
        
        #upload-section { background: white; border: 3px dashed var(--accent); padding: 80px 20px; text-align: center; border-radius: 12px; cursor: pointer; margin-top: 20px; }
        .hidden { display: none !important; }
        
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; }
        .q-meta { font-size: 0.9rem; color: #666; margin-bottom: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .q-stem { font-size: 1.2rem; line-height: 1.7; color: #111; margin-bottom: 25px; white-space: pre-wrap; word-break: break-word; }
        
        .option { 
            border: 2px solid #eaeded; padding: 16px; margin: 12px 0; border-radius: 8px; 
            cursor: pointer; transition: all 0.2s; display: flex; background: #fff;
        }
        .option:hover { border-color: var(--accent); background: #e0f2f1; }
        .option.selected { border-color: var(--accent); background: #b2dfdb; font-weight: bold; }
        .option.is-correct { border-color: var(--success); background: #eafff5; }
        .option.is-wrong { border-color: var(--error); background: #fff0f0; }
        .opt-label { min-width: 30px; font-weight: bold; color: var(--accent); }

        .btn-group { display: flex; gap: 12px; margin-top: 25px; flex-wrap: wrap; }
        button { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sub { background: #eaeded; color: var(--header-bg); border: 1px solid #adb5bd; }
        .result-panel { margin-top: 25px; padding: 20px; border-radius: 8px; border: 1px solid #eee; border-left: 6px solid var(--header-bg); background: #fdfdfd; animation: slideIn 0.3s ease-out; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .cache-notice { background: #e3f2fd; color: #0d47a1; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }

        @media (max-width: 600px) {
            .toolbar { flex-direction: column; align-items: stretch; gap: 15px; padding: 15px; }
            .jump-box { justify-content: center; width: 100%; }
            .toolbar > div:nth-child(2) { width: 100%; justify-content: space-between; }
            .toolbar button { flex: 1; padding: 10px 0; font-size: 0.95rem; white-space: nowrap; }
            .jump-input { width: 55px; }
        }
    </style>
</head>
<body>

<header><h1>CDA 练习题模拟题库</h1></header>

<div class="container">
    <div id="cache-notice" class="cache-notice hidden">
        <span>检测到缓存，已为您还原进度。如需更换文档请点击重置题库。</span>
        <div>
            <button class="btn-sub" style="padding:4px 10px; font-size:12px; margin-right:5px;" onclick="app.clearWrong()">清空错题本</button>
            <button class="btn-sub" style="padding:4px 10px; font-size:12px;" onclick="app.clearCache()">重置题库</button>
        </div>
    </div>
    
    <div id="upload-section" style="background: white; border: 3px dashed var(--accent); padding: 50px 20px; text-align: center; border-radius: 12px; margin-top: 20px; cursor: pointer;">
        <h2 style="margin-bottom: 30px;">请加载或上传 CDA 模拟题库 (Word .docx格式)</h2>
        
        <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
            <button class="btn-main" style="padding: 20px 40px; font-size: 1.2rem; cursor: pointer;" onclick="event.stopPropagation(); app.loadFromUrl('./pdf/cn.docx')">
                🇨🇳 加载中文题库
            </button>
        </div>

        <p style="color:#666; font-size:0.9rem; white-space: pre-line; margin-top: 20px;">
            点击本区域亦可直接上传本地的 .docx 文件
        </p>
        <input type="file" id="file-input" class="hidden" accept=".docx">
        <div id="status-msg" style="margin-top:25px; color:var(--accent); font-weight:bold; font-size: 1.1rem;"></div>
    </div>

    <div id="app-container" class="hidden">
        <div class="toolbar">
            <div class="jump-box">
                <span>题号:</span>
                <input type="number" id="jump-idx" class="jump-input" onkeydown="if(event.keyCode==13) app.jumpTo(this.value)">
                <span id="total-display">/ 0</span>
            </div>
            <div style="display:flex; gap:8px;">
                <button id="mode-all" class="btn-main" onclick="app.switchMode('all')">顺序练习</button>
                <button id="mode-wrong" class="btn-sub" onclick="app.switchMode('wrong')">错题本(<span id="wc">0</span>)</button>
            </div>
        </div>

        <div class="card">
            <div class="q-meta">
                <span id="meta-seq">顺序题号: 1 / 0</span>
                <span id="meta-raw" style="color:var(--accent); font-weight:bold;">QUESTION</span>
            </div>
            
            <div id="q-text" class="q-stem"></div>
            <div id="options-box"></div>
            
            <div class="btn-group">
                <button id="btn-submit" class="btn-main" onclick="app.submit()">提交答案</button>
                <button id="btn-prev" class="btn-sub" onclick="app.prev()">上一题</button>
                <button id="btn-next" class="btn-sub" onclick="app.next()">下一题</button>
            </div>

            <div id="res-box" class="hidden result-panel">
                <div><strong>正确答案:</strong> <span id="ans-val" style="color:var(--success); font-size:1.3rem; font-weight:bold; margin-left:10px;"></span></div>
                <div style="margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                    <strong>解析参考:</strong>
                    <div id="exp-val" style="margin-top:10px; line-height:1.8; color:#444; white-space: pre-wrap;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    class QuizApp {
        constructor() {
            this.KEYS = { 
                DATA: 'cda_data_docx_v1', 
                ALL_IDX: 'cda_all_idx_docx_v1', 
                WRONG_IDX: 'cda_wrong_idx_docx_v1', 
                WRONG: 'cda_wb_docx_v1' 
            };
            this.allQuestions = JSON.parse(localStorage.getItem(this.KEYS.DATA)) || [];
            this.wrongBook = JSON.parse(localStorage.getItem(this.KEYS.WRONG)) || [];
            
            this.allIndex = parseInt(localStorage.getItem(this.KEYS.ALL_IDX)) || 0;
            this.wrongIndex = parseInt(localStorage.getItem(this.KEYS.WRONG_IDX)) || 0;
            
            this.mode = 'all';
            this.isSubmitted = false;
            this.selected = new Set();
            this.init();
        }

        init() {
            this.updateWC();
            if (this.allQuestions.length > 0) {
                document.getElementById('upload-section').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('cache-notice').classList.remove('hidden');
                this.render();
            }
        }

        // 解析本地上传的 DOCX
        async parse(file) {
            const sm = document.getElementById('status-msg');
            const extension = file.name.split('.').pop().toLowerCase();
            
            if (extension !== 'docx') {
                alert("仅支持 .docx 格式的 Word 文档。");
                return;
            }

            sm.innerText = "正在读取 DOCX 文档，请稍候...";

            try {
                const arrayBuffer = await file.arrayBuffer();
                sm.innerText = "正在提取纯文本结构...";
                const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                
                sm.innerText = "提取成功，正在执行解析逻辑...";
                setTimeout(() => {
                    this.extract(result.value);
                }, 100);

            } catch (err) { alert(`解析失败: ` + err.message); }
        }

        // 从 URL 获取并解析 DOCX
        async loadFromUrl(url) {
            const sm = document.getElementById('status-msg');
            sm.innerText = "正在从服务器拉取题库文件，请稍候...";
            
            const buttons = document.querySelectorAll('#upload-section button');
            buttons.forEach(b => b.disabled = true);

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("网络请求失败，文件可能不存在。");
                const arrayBuffer = await response.arrayBuffer();
                
                sm.innerText = "正在提取纯文本结构...";
                const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                
                sm.innerText = "提取成功，正在执行解析逻辑...";
                setTimeout(() => { 
                    this.extract(result.value); 
                }, 100);

            } catch (err) {
                alert(`加载失败！请确保路径正确：${url}\n错误详情: ` + err.message);
                sm.innerText = "加载失败，请刷新页面重试。";
                buttons.forEach(b => b.disabled = false);
            }
        }

        extract(text) {
            text = text.replace(/店铺：IT认证考试服务|Exam Topic|微信：|www\.examtopic\.com|IT认证考试服务/gi, '');
            
            const blocks = text.split(/(?=QUESTION\s+\d+|问题\s+\d+)/gi);
            const parsed = [];

            blocks.forEach(block => {
                if (block.length < 50) return;
                const rawNumMatch = block.match(/(?:QUESTION|问题)\s+(\d+)/i);
                
                const logicNum = rawNumMatch ? parseInt(rawNumMatch[1]) : 9999;
                const rawID = rawNumMatch ? `QUESTION ${rawNumMatch[1]}` : "QUESTION";

                const optRegex = /(?:\s|^)([A-E])[\.．、:]\s/g;
                let match, anchors = [];
                while ((match = optRegex.exec(block)) !== null) {
                    anchors.push({ label: match[1], index: match.index, full: match[0] });
                }
                
                if (anchors.length === 0 || anchors[0].label !== 'A') return;

                const ansKeywords = [/正确答案/i, /答案/];
                const expKeywords = [/解释\/参考/i, /解析参考/i, /解析/i];

                let idxAns = -1;
                for (let kw of ansKeywords) {
                    let found = block.search(kw);
                    if (found !== -1) { idxAns = found; break; }
                }

                let idxExp = -1;
                for (let kw of expKeywords) {
                    let found = block.search(kw);
                    if (found !== -1) { idxExp = found; break; }
                }

                const boundary = idxAns !== -1 ? idxAns : block.length;

                let stem = block.substring(0, anchors[0].index)
                                .replace(/(?:QUESTION|问题)\s+\d+/i, '')
                                .replace(/\s+/g, ' ') 
                                .trim();

                const options = [];
                for (let i = 0; i < anchors.length; i++) {
                    const start = anchors[i].index + anchors[i].full.length;
                    let end = (i + 1 < anchors.length) ? anchors[i+1].index : boundary;
                    let optText = block.substring(start, end).trim().split(/正确答案|答案/i)[0].trim();
                    if (optText) options.push({ label: anchors[i].label, text: optText });
                }

                const ansPart = block.substring(boundary, idxExp !== -1 ? idxExp : block.length);
                const ansMatch = ansPart.match(/[:：]\s*([A-E\s,]+)/i);
                const answer = ansMatch ? ansMatch[1].replace(/[\s,]/g, '').toUpperCase() : "";

                let exp = "暂无详细解析。";
                if (idxExp !== -1) {
                    exp = block.substring(idxExp).replace(/.*[:：]/, '').trim();
                } else if (idxAns !== -1) {
                    let afterAns = block.substring(idxAns).replace(/.*[:：]\s*[A-E\s,]+/i, '').trim();
                    if (afterAns.length > 5) exp = afterAns;
                }

                parsed.push({ logicNum, rawID, stem, options, answer, explanation: exp });
            });

            parsed.sort((a, b) => a.logicNum - b.logicNum);

            if (parsed.length > 0) {
                localStorage.setItem(this.KEYS.DATA, JSON.stringify(parsed));
                localStorage.setItem(this.KEYS.ALL_IDX, 0);
                localStorage.setItem(this.KEYS.WRONG_IDX, 0);
                location.reload();
            } else { alert("未识别到有效题库内容，请检查 Word 文档格式。"); }
        }

        get index() { return this.mode === 'all' ? this.allIndex : this.wrongIndex; }

        set index(val) {
            if (this.mode === 'all') { this.allIndex = val; localStorage.setItem(this.KEYS.ALL_IDX, val); } 
            else { this.wrongIndex = val; localStorage.setItem(this.KEYS.WRONG_IDX, val); }
        }

        render() {
            const data = this.mode === 'all' ? this.allQuestions : this.wrongBook;
            const q = data[this.index];
            if (!q) return;

            this.isSubmitted = false;
            this.selected.clear();
            document.getElementById('res-box').classList.add('hidden');
            
            document.getElementById('jump-idx').value = this.index + 1;
            document.getElementById('total-display').innerText = `/ ${data.length}`;
            document.getElementById('meta-seq').innerText = `${this.mode === 'all' ? '顺序题号' : '错题题号'}: ${this.index + 1} / ${data.length}`;
            document.getElementById('meta-raw').innerText = q.rawID;
            document.getElementById('q-text').innerText = q.stem;
            
            const ob = document.getElementById('options-box');
            ob.innerHTML = '';
            q.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerHTML = `<span class="opt-label">${opt.label}.</span><span class="opt-text">${opt.text}</span>`;
                div.onclick = () => this.toggle(opt.label, div);
                ob.appendChild(div);
            });
            
            document.getElementById('btn-submit').disabled = false;
            document.getElementById('btn-prev').disabled = this.index === 0;
            document.getElementById('btn-next').disabled = this.index === data.length - 1;
            window.scrollTo(0,0);
        }

        toggle(label, el) {
            if (this.isSubmitted) return;
            if (this.selected.has(label)) { this.selected.delete(label); el.classList.remove('selected'); } 
            else { this.selected.add(label); el.classList.add('selected'); }
        }

        submit() {
            if (this.selected.size === 0) return alert("请选择答案");
            const data = this.mode === 'all' ? this.allQuestions : this.wrongBook;
            const q = data[this.index];
            const userAns = Array.from(this.selected).sort().join('');
            
            this.isSubmitted = true;
            document.getElementById('btn-submit').disabled = true;
            document.getElementById('ans-val').innerText = q.answer;
            document.getElementById('exp-val').innerText = q.explanation;
            document.getElementById('res-box').classList.remove('hidden');

            if (userAns !== q.answer) {
                if (!this.wrongBook.some(x => x.stem === q.stem)) {
                    this.wrongBook.push(q);
                    localStorage.setItem(this.KEYS.WRONG, JSON.stringify(this.wrongBook));
                    this.updateWC();
                }
            }
            document.querySelectorAll('.option').forEach(el => {
                const l = el.querySelector('.opt-label').innerText.replace('.','').trim();
                if (q.answer.includes(l)) el.classList.add('is-correct');
                else if (this.selected.has(l)) el.classList.add('is-wrong');
            });
        }

        switchMode(m) {
            if (m === 'wrong' && this.wrongBook.length === 0) return alert("错题本还是空的哦！");
            this.mode = m;
            document.getElementById('mode-all').className = m === 'all' ? 'btn-main' : 'btn-sub';
            document.getElementById('mode-wrong').className = m === 'wrong' ? 'btn-main' : 'btn-sub';
            this.render();
        }

        clearCache() {
            if (confirm("这会清空题库和所有练习进度（错题本除外），确定吗？")) {
                localStorage.removeItem(this.KEYS.DATA);
                localStorage.removeItem(this.KEYS.ALL_IDX);
                localStorage.removeItem(this.KEYS.WRONG_IDX);
                location.reload();
            }
        }

        clearWrong() {
            if (confirm("确定要清空错题本吗？")) {
                localStorage.removeItem(this.KEYS.WRONG);
                localStorage.removeItem(this.KEYS.WRONG_IDX);
                this.wrongBook = [];
                this.wrongIndex = 0;
                this.updateWC();
                if (this.mode === 'wrong') this.switchMode('all');
            }
        }

        updateWC() { document.getElementById('wc').innerText = this.wrongBook.length; }
        prev() { if (this.index > 0) { this.index--; this.render(); } }
        next() { if (this.index < (this.mode === 'all' ? this.allQuestions.length : this.wrongBook.length) - 1) { this.index++; this.render(); } }
        jumpTo(v) {
            const data = this.mode === 'all' ? this.allQuestions : this.wrongBook;
            const n = parseInt(v) - 1;
            if (n >= 0 && n < data.length) { this.index = n; this.render(); }
        }
    }

    const app = new QuizApp();
    document.getElementById('upload-section').addEventListener('click', (e) => {
        if (e.target.tagName !== 'BUTTON') {
            document.getElementById('file-input').click();
        }
    });
    document.getElementById('file-input').onchange = (e) => { if (e.target.files[0]) app.parse(e.target.files[0]); };
</script>
</body>
</html>
